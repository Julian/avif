name: CI

on:
  push:
    branches-ignore:
      - "wip*"
    tags:
      - "v*"
  pull_request:
  schedule:
    # Daily at 9:21
    - cron: "21 9 * * *"
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      noxenvs: ${{ steps.noxenvs-matrix.outputs.noxenvs }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - id: noxenvs-matrix
        run: |
          echo >>$GITHUB_OUTPUT noxenvs=$(
            uvx nox --list-sessions --json | jq '[.[].session]'
          )

  ci:
    needs: list
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        noxenv: ${{ fromJson(needs.list.outputs.noxenvs) }}
        posargs: [""]
        include:
          - os: ubuntu-latest
            noxenv: tests-3.14
            posargs: coverage github

    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libenchant-2-dev
        if: runner.os == 'Linux' && startsWith(matrix.noxenv, 'docs')
      - name: Install dependencies
        run: brew install enchant
        if: runner.os == 'macOS' && startsWith(matrix.noxenv, 'docs')
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.12
            3.13
            3.14
            pypy3.11
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Cache libavif source
        uses: actions/cache@v4
        with:
          path: libavif-0.11.1.tar.gz
          key: libavif-0.11.1
      - name: Download libavif source
        run: test -f libavif-0.11.1.tar.gz || curl -fL --retry 3 -o libavif-0.11.1.tar.gz https://github.com/AOMediaCodec/libavif/archive/v0.11.1.tar.gz
      - name: Install libavif
        run: >
          tar xzf libavif-0.11.1.tar.gz &&
          cd libavif-0.11.1 &&
          cmake -S . -B build &&
          cmake --build build --parallel &&
          sudo cmake --install build
      - name: Add /usr/local/lib to DYLD_LIBRARY_PATH on macOS
        if: runner.os == 'macOS'
        run: echo 'DYLD_LIBRARY_PATH=/usr/local/lib' >>$GITHUB_ENV
      - name: Add /usr/local/lib to LD_LIBRARY_PATH on Linux
        if: runner.os == 'Linux'
        run: echo 'LD_LIBRARY_PATH=/usr/local/lib' >>$GITHUB_ENV

      - name: Run nox
        run: uvx nox -s "${{ matrix.noxenv }}" -- ${{ matrix.posargs }}

  build_wheels:
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Cache libavif source
        uses: actions/cache@v4
        with:
          path: libavif-0.11.1.tar.gz
          key: libavif-0.11.1
      - name: Download libavif source
        run: test -f libavif-0.11.1.tar.gz || curl -fL --retry 3 -o libavif-0.11.1.tar.gz https://github.com/AOMediaCodec/libavif/archive/v0.11.1.tar.gz
      - uses: docker/setup-qemu-action@v3
        if: runner.os == 'Linux'
      - uses: pypa/cibuildwheel@v3.4.1
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  packaging:
    needs: build_wheels
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: https://pypi.org/p/avif

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build sdist
        run: uv run --frozen --with 'build[uv]' -m build --sdist --installer=uv

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create a Release
        if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
